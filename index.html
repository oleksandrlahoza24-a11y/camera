<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixel Miner</title>
  <style>
    /* --- STYLES & OPTIMIZATIONS --- */
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #87CEEB;
      /* Sky color */
      overflow: hidden;
      /* Prevents scroll */
      touch-action: none;
      /* Crucial for iPad/Touch screens to disable gestures */
      font-family: 'Courier New', Courier, monospace;
      user-select: none;
      -webkit-user-select: none;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      /* High-quality pixel art rendering */
      image-rendering: -moz-crisp-edges;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }

    /* iPad/Touch UI Layer */
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      /* Lets clicks pass through to canvas for mining */
    }

    .btn {
      position: absolute;
      bottom: 20px;
      width: 70px;
      height: 70px;
      background: rgba(0, 0, 0, 0.4);
      border: 4px solid rgba(255, 255, 255, 0.6);
      border-radius: 10px;
      color: white;
      font-weight: bold;
      font-size: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: auto;
      /* Enable touch on buttons */
    }

    .btn:active {
      background: rgba(255, 255, 255, 0.4);
    }

    #btn-left {
      left: 20px;
    }

    #btn-right {
      left: 110px;
    }

    #btn-jump {
      right: 20px;
      width: 90px;
      border-radius: 45px;
    }

    /* Inventory Bar */
    #inventory {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      pointer-events: auto;
    }

    #instructions {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <canvas id="gameCanvas"></canvas>

  <div id="ui-layer">
    <div id="inventory">Loading...</div>
    <div id="instructions">Tap blocks to mine!</div>
    <div class="btn" id="btn-left">←</div>
    <div class="btn" id="btn-right">→</div>
    <div class="btn" id="btn-jump">▲</div>
  </div>

  <script>
    /**
 * 1. CONFIGURATION & EXTENSIBILITY
 * This section makes it extremely easy to add content.
 */

// 1a. Color Palette (Hex Codes)
const PALETTE = {

    // Dirt
    'D': '#7a4a32', 'd': '#5c3420', 'Q': '#9b6347', 'q': '#3d2012',
    // Grass top
    'G': '#5a8a2a', 'g': '#3d6318', 'R': '#7ab83a', 'r': '#2d4d10',
    // Stone
    'S': '#7a7e84', 's': '#5a5e66', 'T': '#9a9ea4', 't': '#3a3e46',
    // Coal
    'C': '#1a1a1a', 'c2': '#2d2d2d',

    'I': '#d4b896', 'i': '#b89870',

    'O': '#f0c030', 'o': '#c89010',

    // Bedrock
    'B': '#0d0d0d', 'Z': '#1a1a1a', 'z': '#262626',
    // Grass/moss accent
    'M': '#4a7a20', 'm': '#6aaa30',

    'P': '#f0b882', 'p': '#3a4a8a',

// 1b. Textures (8x8 Pixel Grid Technique)
// Just 'draw' your block using the letters from the palette!
const TEXTURES = {
    'grass': [

    ],
    'dirt': [

    ],
    'stone': [

    ],
    'coal_ore': [

    ],
    'iron_ore': [

    ],
    'gold_ore': [
        "TtSSTtSS",
        "tSOoOtsS",

        "sSoOOsSS",
        "TtSOoOTS",
        "tSoOOtsS",
        "SStTSSSt",
        "sSSsSSss"
    ],
    'diamond_ore': [
        "TtSSTtSS",
        "tSAaAtsS",
        "SSTtAaSt",
        "sSaAAsSS",
        "TtSAaATS",
        "tSaAAtsS",
        "SStTSSSt",
        "sSSsSSss"
    ],
    'bedrock': [
        "BZzBZzBZ",
        "ZBBzZBBz",
        "zBZBzBZB",

        "ZBBzZBBz",
        "zZBZzZBZ",

        "ZBzZBZzB"
    ],
    'player_idle': [
        " hhhhh  ",
        " hHPPh  ",
        " PeEPP  ",
        " PPPPP  ",
        " ccccc  ",
        " cXcXc  ",
        " b   b  ",
        " b   b  "
    ],
    'player_walk1': [
        " hhhhh  ",
        " hHPPh  ",
        " PeEPP  ",
        " PPPPP  ",
        " ccccc  ",
        " cXcXc  ",
        " b b    ",
        "    b   "
    ],
    'player_walk2': [
        " hhhhh  ",
        " hHPPh  ",
        " PeEPP  ",
        " PPPPP  ",
        " ccccc  ",
        " cXcXc  ",
        "    b b ",
        "   b    "
    ],
    'player_jump': [
        " hhhhh  ",
        " hHPPh  ",
        " PeEPP  ",
        " PPPPP  ",
        " ccccc  ",
        " cXcXc  ",
        "b     b ",
        "        "
    ],
    'player_mine': [
        " hhhhh  ",
        " hHPPh  ",
        "PPeEPP  ",
        " PPPPP  ",
        "cccccc  ",
        " cXcXc  ",
        " b   b  ",
        " b   b  "
    ]
};

// 1c. Block Registry
// Define physics and drops here.
const BLOCKS = {
    0: { name: 'Air', solid: false },
    1: { name: 'Grass',       solid: true, texture: 'grass',       drop: 'Dirt',    hardness: 45  },
    2: { name: 'Dirt',        solid: true, texture: 'dirt',        drop: 'Dirt',    hardness: 40  },
    3: { name: 'Stone',       solid: true, texture: 'stone',       drop: 'Stone',   hardness: 90  },
    4: { name: 'Coal Ore',    solid: true, texture: 'coal_ore',    drop: 'Coal',    hardness: 100 },
    5: { name: 'Iron Ore',    solid: true, texture: 'iron_ore',    drop: 'Iron',    hardness: 120 },
    6: { name: 'Gold Ore',    solid: true, texture: 'gold_ore',    drop: 'Gold',    hardness: 140 },
    7: { name: 'Diamond Ore', solid: true, texture: 'diamond_ore', drop: 'Diamond', hardness: 180 },
    8: { name: 'Bedrock',     solid: true, texture: 'bedrock',     drop: null,      unbreakable: true }
};


/**
 * 2. ENGINE SETUP & OPTIMIZATIONS
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false }); // alpha false optimizes performance
const TILE_SIZE = 40; // Scale of blocks on screen
const SPRITE_SIZE = 8; // Internal resolution of our pixel grids

// Pre-render sprites onto hidden canvases (Huge performance boost)
const preRenderedSprites = {};
function compileSprites() {
    for (let key in TEXTURES) {
        const sprCanvas = document.createElement('canvas');
        sprCanvas.width = SPRITE_SIZE;
        sprCanvas.height = SPRITE_SIZE;
        const sprCtx = sprCanvas.getContext('2d');
        const grid = TEXTURES[key];
        
        for (let y = 0; y < SPRITE_SIZE; y++) {
            for (let x = 0; x < SPRITE_SIZE; x++) {
                const char = grid[y][x];
                if (PALETTE[char]) {
                    sprCtx.fillStyle = PALETTE[char];
                    sprCtx.fillRect(x, y, 1, 1);
                }
            }
        }
        preRenderedSprites[key] = sprCanvas;
    }
}
compileSprites();

// Resize handling
let width, height;
function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    ctx.imageSmoothingEnabled = false; // Keep pixels sharp
}
window.addEventListener('resize', resize);
resize();

/**
 * 3. WORLD GENERATION
 */
const WORLD_W = 100;
const WORLD_H = 150;
let world = [];

function generateWorld() {
    for (let x = 0; x < WORLD_W; x++) {
        world[x] = [];
        for (let y = 0; y < WORLD_H; y++) {
            if (y < 20) world[x][y] = 0; // Air
            else if (y === 20) world[x][y] = 1; // Grass
            else if (y > 20 && y < 25) world[x][y] = 2; // Dirt
            else if (y >= WORLD_H - 1) world[x][y] = 8; // Bedrock
            else {
                // Procedural Ores based on depth
                let rand = Math.random();
                let blockId = 3; // Default Stone
                
                if (y > 25) {
                    if (rand < 0.05) blockId = 4; // Coal
                    else if (rand < 0.08 && y > 40) blockId = 5; // Iron
                    else if (rand < 0.095 && y > 70) blockId = 6; // Gold
                    else if (rand < 0.10 && y > 100) blockId = 7; // Diamond
                }
                world[x][y] = blockId;
            }
        }
    }
}
generateWorld();


/**
 * 4. ENTITIES & PHYSICS
 */
const player = {
    x: WORLD_W * TILE_SIZE / 2,
    y: 10 * TILE_SIZE,
    vx: 0, vy: 0,
    width: TILE_SIZE * 0.8,
    height: TILE_SIZE * 0.9,
    speed: 5,
    jumpForce: 10,
    grounded: false,
    inventory: {},
    // Animation state
    frame: 'player_idle',
    walkTimer: 0,
    walkFrame: 0,
    mineTimer: 0,
    facing: 1 // 1 = right, -1 = left
};

const gravity = 0.5;
const maxFallSpeed = 12;

const camera = { x: 0, y: 0 };

// Controls State
const keys = { left: false, right: false, up: false };

// Mining state — holds the block currently being mined
let miningTarget = null; // { tileX, tileY, progress, required }

// Particle system
const particles = [];
function spawnParticles(tileX, tileY, blockId) {
    const block = BLOCKS[blockId];
    if (!block || !block.texture) return;

    const blockColors = {
        1: ['#5a8a2a','#3d6318','#7ab83a','#7a4a32'],
        2: ['#7a4a32','#5c3420','#9b6347','#3d2012'],
        3: ['#7a7e84','#5a5e66','#9a9ea4','#3a3e46'],
        4: ['#1a1a1a','#2d2d2d','#5a5e66','#3a3e46'],
        5: ['#d4b896','#b89870','#7a7e84','#9a9ea4'],
        6: ['#f0c030','#c89010','#7a7e84','#f0d060'],
        7: ['#40c8d8','#20a0b0','#5a5e66','#80e8f8'],
        8: ['#333333','#1a1a1a','#444444','#222222']
    };
    const colors = blockColors[blockId] || ['#888888','#aaaaaa','#666666'];

    const cx = tileX * TILE_SIZE + TILE_SIZE / 2;
    const cy = tileY * TILE_SIZE + TILE_SIZE / 2;

    // Floor Y = bottom edge of this tile (so debris lands on the surface below)
    const floorY = (tileY + 1) * TILE_SIZE;

    // Spawn 7 chunky shards with outward burst, then gravity + floor collision
    const NUM_SHARDS = 7;
    for (let i = 0; i < NUM_SHARDS; i++) {
        // Spread shards across the block face
        const spawnOffX = (Math.random() - 0.5) * TILE_SIZE * 0.7;
        const spawnOffY = (Math.random() - 0.5) * TILE_SIZE * 0.5;

        // Outward velocity: bias upward and sideways like a real break
        const angle = -Math.PI * 0.9 + (i / (NUM_SHARDS - 1)) * Math.PI * 0.8; // arc upward
        const speed = 2.5 + Math.random() * 4.5;
        const vx = Math.cos(angle) * speed + (Math.random() - 0.5) * 1.5;
        const vy = Math.sin(angle) * speed - 1.5 - Math.random() * 2;

        const size = 4 + Math.random() * 5;           // chunky shard size
        const color = colors[Math.floor(Math.random() * colors.length)];
        const rotation = Math.random() * Math.PI * 2;
        const spin = (Math.random() - 0.5) * 0.25;

        particles.push({
            x: cx + spawnOffX,
            y: cy + spawnOffY,
            vx, vy,
            size,
            life: 1.0,
            decay: 0.0,                // no time-based fade while falling
            fadeTrigger: false,        // starts fading after landing
            fadeRate: 0.025 + Math.random() * 0.02,
            color,
            rotation,
            spin,
            gravity: 0.45,
            bounced: false,
            floorY,
            landed: false
        });
    }

    // A few tiny dust puffs for visual flair
    for (let i = 0; i < 5; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.8 + Math.random() * 2;
        particles.push({
            x: cx + (Math.random() - 0.5) * TILE_SIZE * 0.4,
            y: cy + (Math.random() - 0.5) * TILE_SIZE * 0.3,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1.5,
            size: 2 + Math.random() * 2,
            life: 1.0,
            decay: 0.03 + Math.random() * 0.025,
            fadeTrigger: true,
            fadeRate: 0.03,
            color: colors[0],
            rotation: 0, spin: 0,
            gravity: 0.12,
            bounced: false, floorY,
            landed: false,
            isDust: true
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        if (!p.landed) {
            p.vy += p.gravity;
            p.x += p.vx;
            p.y += p.vy;

            // Spin while airborne
            if (p.spin !== undefined) p.rotation += p.spin;

            // Floor collision — land on the tile below the broken block
            // Also check the actual world grid for solid blocks beneath
            const tileXUnder = Math.floor(p.x / TILE_SIZE);
            const tileYUnder = Math.floor(p.y / TILE_SIZE);
            const onSolidGround = (
                tileXUnder >= 0 && tileXUnder < WORLD_W &&
                tileYUnder >= 0 && tileYUnder < WORLD_H &&
                BLOCKS[world[tileXUnder][tileYUnder]]?.solid
            );
            const hitFloor = p.y >= p.floorY || onSolidGround;

            if (hitFloor) {
                if (!p.isDust && !p.bounced && Math.abs(p.vy) > 2) {
                    // Small bounce
                    p.y = p.floorY - p.size / 2;
                    p.vy = -Math.abs(p.vy) * 0.28;
                    p.vx *= 0.55;
                    p.spin *= 0.3;
                    p.bounced = true;
                } else {
                    // Settle on floor
                    p.y = p.floorY - p.size / 2;
                    p.vy = 0;
                    p.vx = 0;
                    p.spin = 0;
                    p.landed = true;
                    p.fadeTrigger = true;
                }
            }
        } else {
            // Settled — just fade out
            p.life -= p.fadeRate;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
        }

        // Dust fades immediately in flight
        if (p.isDust) {
            p.life -= p.decay;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
        }
    }
}

function drawParticles() {
    for (const p of particles) {
        const alpha = p.isDust ? p.life * 0.7 : (p.landed ? p.life : Math.min(1, p.life + 0.1));
        ctx.globalAlpha = Math.max(0, alpha);
        ctx.fillStyle = p.color;

        if (p.isDust) {
            // Simple round dust puff
            const s = p.size * (p.isDust ? p.life + 0.4 : 1);
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.5, s), 0, Math.PI * 2);
            ctx.fill();
        } else {
            // Chunky rotated shard
            ctx.save();
            ctx.translate(Math.round(p.x), Math.round(p.y));
            ctx.rotate(p.rotation || 0);
            const s = p.size;
            // Draw as irregular chunk: rectangle with a small dark edge
            ctx.fillStyle = p.color;
            ctx.fillRect(-s/2, -s/2, s, s);
            // Dark edge on two sides for a chipped-rock look
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fillRect(-s/2, s/2 - 1.5, s, 1.5);
            ctx.fillRect(s/2 - 1.5, -s/2, 1.5, s);
            ctx.restore();
        }
    }
    ctx.globalAlpha = 1;
}

// AABB Collision check against the world grid
function checkCollision(px, py) {
    let leftTile = Math.floor(px / TILE_SIZE);
    let rightTile = Math.floor((px + player.width) / TILE_SIZE);
    let topTile = Math.floor(py / TILE_SIZE);
    let bottomTile = Math.floor((py + player.height) / TILE_SIZE);

    for (let x = leftTile; x <= rightTile; x++) {
        for (let y = topTile; y <= bottomTile; y++) {
            if (x >= 0 && x < WORLD_W && y >= 0 && y < WORLD_H) {
                if (BLOCKS[world[x][y]].solid) return true;
            } else if (x < 0 || x >= WORLD_W || y >= WORLD_H) {
                return true; // World boundaries are solid
            }
        }
    }
    return false;
}

function updatePhysics() {
    // Horizontal
    if (keys.left) player.vx = -player.speed;
    else if (keys.right) player.vx = player.speed;
    else player.vx = 0;

    player.x += player.vx;
    if (checkCollision(player.x, player.y)) {
        // Resolve horizontal
        if (player.vx > 0) player.x = Math.floor((player.x + player.width) / TILE_SIZE) * TILE_SIZE - player.width - 0.1;
        if (player.vx < 0) player.x = Math.floor(player.x / TILE_SIZE) * TILE_SIZE + TILE_SIZE + 0.1;
    }

    // Vertical
    player.vy += gravity;
    if (player.vy > maxFallSpeed) player.vy = maxFallSpeed;
    
    player.y += player.vy;
    player.grounded = false;

    if (checkCollision(player.x, player.y)) {
        // Resolve vertical
        if (player.vy > 0) { // Landing
            player.y = Math.floor((player.y + player.height) / TILE_SIZE) * TILE_SIZE - player.height - 0.1;
            player.grounded = true;
        }
        if (player.vy < 0) { // Hitting ceiling
            player.y = Math.floor(player.y / TILE_SIZE) * TILE_SIZE + TILE_SIZE + 0.1;
        }
        player.vy = 0;
    }

    // Jump
    if (keys.up && player.grounded) {
        player.vy = -player.jumpForce;
    }

    // Tick mining progress
    if (miningTarget) {
        miningTarget.progress++;
        if (miningTarget.progress >= miningTarget.required) {
            const { tileX, tileY } = miningTarget;
            const blockId = world[tileX][tileY];
            const block = BLOCKS[blockId];
            world[tileX][tileY] = 0;
            spawnParticles(tileX, tileY, blockId);
            if (block.drop) {
                if (!player.inventory[block.drop]) player.inventory[block.drop] = 0;
                player.inventory[block.drop]++;
                updateUI();
            }
            miningTarget = null;
        }
        player.mineTimer = 12;
    }

    // Animation state machine
    if (player.mineTimer > 0) {
        player.mineTimer--;
        player.frame = 'player_mine';
    } else if (!player.grounded) {
        player.frame = 'player_jump';
    } else if (keys.left || keys.right) {
        player.walkTimer++;
        if (player.walkTimer > 8) {
            player.walkTimer = 0;
            player.walkFrame = 1 - player.walkFrame;
        }
        player.frame = player.walkFrame === 0 ? 'player_walk1' : 'player_walk2';
    } else {
        player.frame = 'player_idle';
        player.walkTimer = 0;
    }
    if (keys.left) player.facing = -1;
    if (keys.right) player.facing = 1;

    // Camera follow player seamlessly
    camera.x = player.x - width / 2 + player.width / 2;
    camera.y = player.y - height / 2 + player.height / 2;
}


/**
 * 5. INTERACTION & INPUT (Touch & Mouse)
 */
function bindBtn(id, key) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('mousedown', (e) => { e.preventDefault(); keys[key] = true; });
    btn.addEventListener('mouseup', (e) => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('mouseleave', (e) => { e.preventDefault(); keys[key] = false; });
}
bindBtn('btn-left', 'left');
bindBtn('btn-right', 'right');
bindBtn('btn-jump', 'up');

// Keyboard fallback for desktop testing
window.addEventListener('keydown', (e) => {
    if (e.key === 'a' || e.key === 'ArrowLeft') keys.left = true;
    if (e.key === 'd' || e.key === 'ArrowRight') keys.right = true;
    if (e.key === 'w' || e.key === 'ArrowUp' || e.key === ' ') keys.up = true;
});
window.addEventListener('keyup', (e) => {
    if (e.key === 'a' || e.key === 'ArrowLeft') keys.left = false;
    if (e.key === 'd' || e.key === 'ArrowRight') keys.right = false;
    if (e.key === 'w' || e.key === 'ArrowUp' || e.key === ' ') keys.up = false;
});

// Mining Logic — hold/tap to mine with progress
function getPointerTile(e) {
    const clickX = e.clientX + camera.x;
    const clickY = e.clientY + camera.y;
    return { tileX: Math.floor(clickX / TILE_SIZE), tileY: Math.floor(clickY / TILE_SIZE) };
}

canvas.addEventListener('pointerdown', (e) => {
    const { tileX, tileY } = getPointerTile(e);
    if (tileX >= 0 && tileX < WORLD_W && tileY >= 0 && tileY < WORLD_H) {
        const blockId = world[tileX][tileY];
        const block = BLOCKS[blockId];
        const dx = (tileX * TILE_SIZE + TILE_SIZE/2) - (player.x + player.width/2);
        const dy = (tileY * TILE_SIZE + TILE_SIZE/2) - (player.y + player.height/2);
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < TILE_SIZE * 4 && block.solid && !block.unbreakable) {
            miningTarget = { tileX, tileY, progress: 0, required: block.hardness || 60 };
        }
    }
});

canvas.addEventListener('pointermove', (e) => {
    if (!miningTarget) return;
    const { tileX, tileY } = getPointerTile(e);
    if (tileX !== miningTarget.tileX || tileY !== miningTarget.tileY) {
        miningTarget = null; // Moved off block, cancel
    }
});

canvas.addEventListener('pointerup',     () => { miningTarget = null; });
canvas.addEventListener('pointercancel', () => { miningTarget = null; });

// Crack overlay stages (drawn over block while mining)
function drawCrackOverlay(tileX, tileY, progress, required) {
    const stage = Math.floor((progress / required) * 8); // 0–7
    const x = tileX * TILE_SIZE;
    const y = tileY * TILE_SIZE;
    const T = TILE_SIZE;
    ctx.globalAlpha = 0.18 + stage * 0.07;
    ctx.fillStyle = '#000000';
    // Draw progressively more crack pixels based on stage
    const crackPatterns = [
        [[3,2],[4,2]],
        [[3,2],[4,2],[3,3]],
        [[2,2],[3,2],[4,2],[3,3],[4,3]],
        [[2,2],[3,2],[4,2],[3,3],[4,3],[2,4]],
        [[1,2],[2,2],[3,2],[4,2],[3,3],[4,3],[2,4],[5,4]],
        [[1,2],[2,2],[3,2],[4,2],[3,3],[4,3],[2,4],[5,4],[1,5],[5,5]],
        [[0,1],[1,2],[2,2],[3,2],[4,2],[5,2],[3,3],[4,3],[2,4],[5,4],[1,5],[5,5],[0,6]],
        [[0,1],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[3,3],[4,3],[2,4],[5,4],[1,5],[5,5],[0,6],[6,6],[3,7]]
    ];
    const px = Math.floor(T / 8);
    const pattern = crackPatterns[Math.min(stage, 7)];
    for (const [cx, cy] of pattern) {
        ctx.fillRect(x + cx * px, y + cy * px, px, px);
    }
    ctx.globalAlpha = 1;
}

function updateUI() {
    let invHtml = "<b>INVENTORY</b><br>";
    let empty = true;
    for (let item in player.inventory) {
        invHtml += `${item}: ${player.inventory[item]}<br>`;
        empty = false;
    }
    if(empty) invHtml += "Empty";
    document.getElementById('inventory').innerHTML = invHtml;
}
updateUI(); // Init UI


/**
 * 6. RENDER LOOP
 */
function draw() {
    // Clear screen with sky color
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, width, height);

    ctx.save();
    // Offset canvas by camera position
    ctx.translate(-camera.x, -camera.y);

    // Frustum Culling (Optimization: only draw tiles visible on screen)
    const startCol = Math.max(0, Math.floor(camera.x / TILE_SIZE));
    const endCol = Math.min(WORLD_W, Math.ceil((camera.x + width) / TILE_SIZE));
    const startRow = Math.max(0, Math.floor(camera.y / TILE_SIZE));
    const endRow = Math.min(WORLD_H, Math.ceil((camera.y + height) / TILE_SIZE));

    for (let x = startCol; x < endCol; x++) {
        for (let y = startRow; y < endRow; y++) {
            const blockId = world[x][y];
            if (blockId !== 0) {
                const textureName = BLOCKS[blockId].texture;
                const sprite = preRenderedSprites[textureName];
                if (sprite) {
                    ctx.drawImage(sprite, x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }
        }
    }

    // Draw crack overlay on block being mined
    if (miningTarget) {
        drawCrackOverlay(miningTarget.tileX, miningTarget.tileY, miningTarget.progress, miningTarget.required);
    }

    // Draw particles
    drawParticles();

    // Draw Player with animation frame
    const pSprite = preRenderedSprites[player.frame] || preRenderedSprites['player_idle'];
    ctx.save();
    const cx = player.x + player.width / 2;
    const cy = player.y + player.height / 2;
    ctx.translate(cx, cy);
    ctx.scale(player.facing, 1);
    ctx.translate(-player.width / 2, -player.height / 2);
    ctx.drawImage(pSprite, 0, 0, player.width, player.height);
    ctx.restore();

    ctx.restore();
}

// Main Game Loop
let lastTime = 0;
function loop(timestamp) {
    updatePhysics();
    updateParticles();
    draw();
    requestAnimationFrame(loop);
}

// Start game
requestAnimationFrame(loop);

  </script>
