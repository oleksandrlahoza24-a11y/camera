<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quote Vault | Professional Edition</title>
    
    <!-- Professional Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Professional Dark Slate Color Palette */
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --border-radius: 12px;
            --transition: all 0.2s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        /* Top Navigation / Header */
        header {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            color: var(--accent-color);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        /* Buttons & Inputs (iPad touch optimized to min 44px height) */
        button, input, textarea {
            font-family: 'Inter', sans-serif;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--surface-color);
            color: var(--text-main);
            outline: none;
            transition: var(--transition);
            font-size: 1rem;
        }

        button {
            cursor: pointer;
            padding: 12px 20px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 48px; /* iPad Touch Target Standard */
        }

        button.primary {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        button.primary:hover {
            background-color: var(--accent-hover);
        }

        button.secondary {
            background-color: transparent;
        }

        button.secondary:hover {
            background-color: var(--border-color);
        }

        button.icon-btn {
            padding: 12px;
            color: var(--text-muted);
            background: transparent;
            border: none;
        }

        button.icon-btn:hover {
            color: var(--danger-color);
            background: rgba(239, 68, 68, 0.1);
        }

        input, textarea {
            width: 100%;
            padding: 14px;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Main Layout */
        main {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 850px) {
            main {
                grid-template-columns: 350px 1fr; /* Two columns for iPad Landscape & Desktop */
                align-items: start;
            }
        }

        /* Input Section */
        .input-panel {
            background-color: var(--surface-color);
            padding: 24px;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: sticky;
            top: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        /* Quotes Section */
        .quotes-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-bar {
            position: relative;
        }

        .search-bar i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-bar input {
            padding-left: 45px;
        }

        .quotes-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 1100px) {
            .quotes-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Individual Quote Card */
        .quote-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            transition: var(--transition);
        }

        .quote-card:hover {
            border-color: #475569;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .quote-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .quote-tag {
            background-color: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .quote-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .quote-body {
            font-family: 'Lora', serif;
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--text-main);
            font-style: italic;
        }

        .quote-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .quote-author {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Hidden File Input for Import */
        #importFile {
            display: none;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-vault"></i> SecureVault
        </div>
        <div class="header-actions">
            <!-- Hidden file input for importing data -->
            <input type="file" id="importFile" accept=".json" onchange="importData(event)">
            
            <button class="secondary" onclick="document.getElementById('importFile').click()" title="Restore from file">
                <i class="fa-solid fa-file-import"></i> <span class="hide-mobile">Import</span>
            </button>
            <button class="secondary" onclick="exportData()" title="Backup to file">
                <i class="fa-solid fa-file-export"></i> <span class="hide-mobile">Export</span>
            </button>
        </div>
    </header>

    <main>
        <!-- Left Panel: Input Form -->
        <aside class="input-panel">
            <div class="input-group">
                <label for="quoteInput">Quote Text</label>
                <textarea id="quoteInput" placeholder="Enter the exact words..."></textarea>
            </div>
            <div class="input-group">
                <label for="authorInput">Author</label>
                <input type="text" id="authorInput" placeholder="e.g. Marcus Aurelius">
            </div>
            <div class="input-group">
                <label for="tagInput">Category / Tag</label>
                <input type="text" id="tagInput" placeholder="e.g. Philosophy, Motivation...">
            </div>
            <button class="primary" onclick="addQuote()">
                <i class="fa-solid fa-bookmark"></i> Save Quote
            </button>
        </aside>

        <!-- Right Panel: Quotes & Search -->
        <section class="quotes-section">
            <div class="search-bar">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search your vault by keyword or author..." oninput="filterQuotes()">
            </div>

            <div class="quotes-grid" id="quotesGrid">
                <!-- Quotes render here -->
            </div>
        </section>
    </main>

    <script>
        /* =========================================================================
           SECURITY FEATURE: HTML Sanitizer
           Prevents Cross-Site Scripting (XSS) if malicious code is pasted in.
           ========================================================================= */
        function sanitize(str) {
            if (!str) return '';
            const temp = document.createElement('div');
            temp.textContent = str;
            return temp.innerHTML;
        }

        /* =========================================================================
           DATA MANAGEMENT
           Pulling from localStorage. Adding unique IDs and Timestamps.
           ========================================================================= */
        let quotes = JSON.parse(localStorage.getItem('VaultSecureQuotes')) || [];

        const quoteInput = document.getElementById('quoteInput');
        const authorInput = document.getElementById('authorInput');
        const tagInput = document.getElementById('tagInput');
        const searchInput = document.getElementById('searchInput');
        const quotesGrid = document.getElementById('quotesGrid');

        // Render quotes to the UI
        function renderQuotes(filterText = "") {
            quotesGrid.innerHTML = ''; 
            
            // Filter logic for the search bar
            const filteredQuotes = quotes.filter(q => 
                q.text.toLowerCase().includes(filterText.toLowerCase()) || 
                q.author.toLowerCase().includes(filterText.toLowerCase()) ||
                q.tag.toLowerCase().includes(filterText.toLowerCase())
            );

            if (filteredQuotes.length === 0) {
                quotesGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-box-open"></i>
                        <h2>No quotes found</h2>
                        <p>Your vault is empty or no search results match.</p>
                    </div>`;
                return;
            }

            filteredQuotes.forEach(quote => {
                const card = document.createElement('div');
                card.className = 'quote-card';
                
                // Format the date to be human readable
                const dateObj = new Date(quote.date);
                const formattedDate = dateObj.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });

                // Securely render content using our sanitize function
                card.innerHTML = `
                    <div class="quote-header">
                        ${quote.tag ? `<span class="quote-tag"><i class="fa-solid fa-tag" style="font-size: 10px;"></i> ${sanitize(quote.tag)}</span>` : '<div></div>'}
                        <span class="quote-date">${formattedDate}</span>
                    </div>
                    <div class="quote-body">"${sanitize(quote.text)}"</div>
                    <div class="quote-footer">
                        <div class="quote-author">— ${sanitize(quote.author) || 'Unknown'}</div>
                        <button class="icon-btn" onclick="deleteQuote('${quote.id}')" title="Delete Quote">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
                
                quotesGrid.appendChild(card);
            });
        }

        // Add a new quote
        function addQuote() {
            const text = quoteInput.value.trim();
            const author = authorInput.value.trim();
            const tag = tagInput.value.trim();

            if (text === '') {
                alert("Please enter a quote before saving.");
                return;
            }

            const newQuote = {
                id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(), // Secure unique ID
                text: text,
                author: author,
                tag: tag,
                date: new Date().toISOString()
            };

            quotes.unshift(newQuote);
            saveData();

            // Reset inputs
            quoteInput.value = '';
            authorInput.value = '';
            tagInput.value = '';
            searchInput.value = '';
            
            renderQuotes();
        }

        // Delete a quote by ID
        function deleteQuote(id) {
            if(confirm("Are you sure you want to permanently delete this quote?")) {
                quotes = quotes.filter(q => q.id !== id);
                saveData();
                filterQuotes(); // Re-render with current search filter
            }
        }

        // Search filter trigger
        function filterQuotes() {
            renderQuotes(searchInput.value);
        }

        // Core save function
        function saveData() {
            localStorage.setItem('VaultSecureQuotes', JSON.stringify(quotes));
        }

        /* =========================================================================
           BACKUP & RESTORE (Extra Security against Data Loss)
           ========================================================================= */
        
        // Export to JSON file
        function exportData() {
            if (quotes.length === 0) {
                alert("There are no quotes to export.");
                return;
            }
            const dataStr = JSON.stringify(quotes, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `QuoteVault_Backup_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Import from JSON file
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedQuotes = JSON.parse(e.target.result);
                    if (Array.isArray(importedQuotes)) {
                        // Merge imported quotes, avoiding duplicates by ID
                        const existingIds = new Set(quotes.map(q => q.id));
                        importedQuotes.forEach(q => {
                            if (!existingIds.has(q.id)) {
                                quotes.push(q);
                            }
                        });
                        
                        // Sort by date (newest first)
                        quotes.sort((a, b) => new Date(b.date) - new Date(a.date));
                        
                        saveData();
                        renderQuotes();
                        alert("Vault successfully restored/updated!");
                    } else {
                        alert("Invalid file format. Please upload a valid Quote Vault backup.");
                    }
                } catch (err) {
                    alert("Error reading file. Make sure it's a valid JSON backup.");
                }
            };
            reader.readAsText(file);
            // Reset the input so the same file can be uploaded again if needed
            event.target.value = '';
        }

        // Initial render on page load
        renderQuotes();
    </script>
</body>
</html>
