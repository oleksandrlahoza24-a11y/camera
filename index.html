<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --wall: #f8f8f6;
      --shadow: rgba(0,0,0,0.08);
      --frame: #fff;
      --arrow: #1a1a1a;
      --arrow-hover: #555;
      --transition: 0.55s cubic-bezier(0.77, 0, 0.175, 1);
    }

    body {
      background: #e8e8e6;
      font-family: 'Georgia', serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    /* ── ROOM / WALL ─────────────────────────────── */
    .room {
      perspective: 900px;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wall {
      position: relative;
      width: min(82vw, 900px);
      height: min(72vh, 580px);
      background: var(--wall);
      border-radius: 2px;
      box-shadow:
        0 2px 0 #ddd,
        0 4px 0 #ccc,
        0 40px 80px rgba(0,0,0,0.18),
        inset 0 0 60px rgba(0,0,0,0.02);
      transform-style: preserve-3d;
      transform: rotateX(1deg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* subtle baseboard */
    .wall::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 14px;
      background: linear-gradient(to top, #ddd, transparent);
      pointer-events: none;
    }

    /* ── FRAME VIEWPORT ──────────────────────────── */
    .frame-wrap {
      position: relative;
      width: 72%;
      max-width: 560px;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame {
      position: absolute;
      inset: 0;
      background: var(--frame);
      box-shadow:
        0 0 0 2px #e0e0e0,
        0 0 0 18px var(--frame),
        0 0 0 20px #d8d8d4,
        8px 12px 32px rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* picture inside the frame */
    .pic {
      position: absolute;
      inset: 18px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0ee;
    }

    .pic img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: opacity 0.3s ease;
    }

    /* ── SLIDE ANIMATION LAYERS ──────────────────── */
    .slide-out-left  { animation: slideOutLeft  var(--transition) forwards; }
    .slide-out-right { animation: slideOutRight var(--transition) forwards; }
    .slide-in-left   { animation: slideInLeft   var(--transition) forwards; }
    .slide-in-right  { animation: slideInRight  var(--transition) forwards; }

    @keyframes slideOutLeft  { to { transform: translateX(-110%) scale(0.9); opacity: 0; } }
    @keyframes slideOutRight { to { transform: translateX( 110%) scale(0.9); opacity: 0; } }
    @keyframes slideInLeft   { from { transform: translateX(-110%) scale(0.9); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes slideInRight  { from { transform: translateX( 110%) scale(0.9); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ── ARROWS ──────────────────────────────────── */
    .arrows {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
    }

    .arrow {
      pointer-events: all;
      cursor: pointer;
      background: none;
      border: none;
      padding: 12px 10px;
      opacity: 0.35;
      transition: opacity 0.2s, transform 0.2s;
    }

    .arrow:hover { opacity: 1; transform: scale(1.15); }
    .arrow:active { transform: scale(0.95); }

    .arrow svg {
      width: 28px;
      height: 28px;
      stroke: var(--arrow);
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── COUNTER ─────────────────────────────────── */
    .counter {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.18em;
      color: #aaa;
      font-family: 'Georgia', serif;
      font-style: italic;
    }

    /* ── DOT STRIP ───────────────────────────────── */
    .dots {
      position: absolute;
      bottom: 42px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.3s, transform 0.3s;
      cursor: pointer;
    }

    .dot.active {
      background: #999;
      transform: scale(1.4);
    }

    /* ── CAPTION ─────────────────────────────────── */
    .caption {
      position: absolute;
      bottom: -34px;
      width: 100%;
      text-align: center;
      font-size: 11.5px;
      color: #aaa;
      letter-spacing: 0.12em;
      font-family: 'Georgia', serif;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── LOADING / EMPTY ─────────────────────────── */
    .empty {
      color: #bbb;
      font-size: 13px;
      letter-spacing: 0.1em;
      font-style: italic;
    }

    /* ── KEYBOARD HINT ───────────────────────────── */
    .hint {
      position: fixed;
      bottom: 18px;
      right: 24px;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #bbb;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="room">
  <div class="wall" id="wall">

    <!-- arrows sit on the wall, outside the frame -->
    <div class="arrows">
      <button class="arrow" id="btnPrev" aria-label="Previous">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="arrow" id="btnNext" aria-label="Next">
        <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
      </button>
    </div>

    <!-- frame + image -->
    <div class="frame-wrap">
      <div class="frame" id="frame">
        <div class="pic" id="pic">
          <span class="empty" id="emptyMsg">no images found</span>
        </div>
      </div>
      <div class="caption" id="caption"></div>
    </div>

    <!-- dots -->
    <div class="dots" id="dots"></div>
    <!-- counter -->
    <div class="counter" id="counter"></div>

  </div>
</div>

<div class="hint">← → keys</div>

<script>
  // ── CONFIG ─────────────────────────────────────────────────────────────────
  // Images are listed in images/manifest.json as an array of filenames.
  // Example manifest.json:  ["photo1.jpg","cat.png","sunset.webp"]
  // A helper generate_manifest.py is included to auto-build this file.
  const IMAGES_FOLDER = 'images/';
  const MANIFEST      = IMAGES_FOLDER + 'manifest.json';

  // ── STATE ──────────────────────────────────────────────────────────────────
  let images  = [];
  let current = 0;
  let busy    = false;

  // ── ELEMENTS ───────────────────────────────────────────────────────────────
  const pic      = document.getElementById('pic');
  const counter  = document.getElementById('counter');
  const dotsEl   = document.getElementById('dots');
  const caption  = document.getElementById('caption');
  const emptyMsg = document.getElementById('emptyMsg');
  const btnPrev  = document.getElementById('btnPrev');
  const btnNext  = document.getElementById('btnNext');

  // ── LOAD MANIFEST ──────────────────────────────────────────────────────────
  fetch(MANIFEST)
    .then(r => r.json())
    .then(list => {
      images = list.filter(Boolean);
      if (images.length) {
        emptyMsg.style.display = 'none';
        buildDots();
        showImage(0, null);
      }
    })
    .catch(() => {
      emptyMsg.textContent = 'add images to images/ and run generate_manifest.py';
    });

  // ── BUILD DOT STRIP ────────────────────────────────────────────────────────
  function buildDots() {
    dotsEl.innerHTML = '';
    // show dots only if ≤ 20 images (otherwise too crowded)
    if (images.length > 20) return;
    images.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.addEventListener('click', () => navigate(i));
      dotsEl.appendChild(d);
    });
  }

  function updateDots(idx) {
    [...dotsEl.querySelectorAll('.dot')].forEach((d, i) =>
      d.classList.toggle('active', i === idx)
    );
  }

  // ── SHOW IMAGE ─────────────────────────────────────────────────────────────
  function showImage(idx, direction) {
    current = (idx + images.length) % images.length;
    const src  = IMAGES_FOLDER + images[current];
    const name = images[current].replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');

    // animate out old content
    if (direction && pic.firstElementChild) {
      const outClass = direction === 'left' ? 'slide-out-left' : 'slide-out-right';
      const old = pic.firstElementChild;
      old.classList.add(outClass);
      old.addEventListener('animationend', () => old.remove(), { once: true });
    } else {
      pic.innerHTML = '';
    }

    // create new image element
    const img = document.createElement('img');
    img.src = src;
    img.alt = name;
    if (direction) {
      img.classList.add(direction === 'left' ? 'slide-in-right' : 'slide-in-left');
    }
    pic.appendChild(img);

    counter.textContent = (current + 1) + ' / ' + images.length;
    caption.textContent = name;
    updateDots(current);
  }

  // ── NAVIGATE ───────────────────────────────────────────────────────────────
  function navigate(target) {
    if (!images.length) return;
    const direction = target > current ? 'left' : 'right';
    showImage(target, direction);
  }

  btnPrev.addEventListener('click', () => navigate(current - 1));
  btnNext.addEventListener('click', () => navigate(current + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  navigate(current - 1);
    if (e.key === 'ArrowRight') navigate(current + 1);
  });

  // touch / swipe
  let touchX = null;
  document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
  document.addEventListener('touchend', e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) navigate(dx < 0 ? current + 1 : current - 1);
    touchX = null;
  });
</script>

</body>
</html>
